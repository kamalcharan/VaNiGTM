# ============================================================
# ProKey — Nginx Reverse Proxy
#
# Routes:
#   /api/v1/*  →  backend:3001  (Express API)
#   /health    →  backend:3001  (health check passthrough)
#   /*         →  frontend:3000 (Next.js UI)
#
# Browser code uses window.location.origin as the API base,
# so all API calls arrive at nginx and are routed to the backend.
# No hardcoded API URL needed in the frontend image.
# ============================================================

upstream prokey_backend {
    server backend:3001;
    keepalive 32;
}

upstream prokey_frontend {
    server frontend:3000;
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    # ── Logging ───────────────────────────────────────────
    access_log /var/log/nginx/prokey_access.log;
    error_log  /var/log/nginx/prokey_error.log warn;

    # ── Timeouts (generous for long-running API calls) ────
    proxy_connect_timeout 60s;
    proxy_send_timeout    120s;
    proxy_read_timeout    120s;

    # ── Health check (direct to backend) ─────────────────
    location = /health {
        proxy_pass http://prokey_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;
    }

    # ── API routes → Express backend ─────────────────────
    location /api/v1/ {
        proxy_pass http://prokey_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # File uploads (CAS/InvestWell imports can be large)
        client_max_body_size 50M;
        proxy_request_buffering off;
    }

    # ── All other requests → Next.js frontend ─────────────
    location / {
        proxy_pass http://prokey_frontend;
        proxy_http_version 1.1;
        proxy_set_header Connection        "";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Next.js hot reload support (not used in production but harmless)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_cache_bypass          $http_upgrade;
    }
}
